name: Deploy Wonzay to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to EC2 (Sydney)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          port: 22
          script: |
            cd /home/developer/wonzay_prod/wonzay

            echo "Pulling latest code from GitHub..."
            git pull origin master

            echo "Activating virtual environment..."
            source venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt

            echo "Running database migrations..."
            DJANGO_SETTINGS_MODULE=config.settings.development python manage.py migrate --noinput

            echo "Collecting static files..."
            DJANGO_SETTINGS_MODULE=config.settings.development python manage.py collectstatic --noinput

            echo "Restarting application..."
            sudo systemctl restart wonzay

            echo "Deployment complete!"
