{% extends "base.html" %}
{% block title %}Reset Password — Wonzays Kollections{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4 bg-[var(--color-surface)]">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="font-serif font-bold text-2xl">Reset your password</h1>
      <p class="text-sm text-[var(--color-text-muted)] mt-1">Enter your email and we'll send a reset link.</p>
    </div>
    <div class="bg-white border border-[var(--color-border)] p-8">
      <form method="post" class="flex flex-col gap-4">{% csrf_token %}
        <div><label class="label" for="id_email">Email address</label>{{ form.email }}</div>
        <button type="submit" class="btn-primary w-full py-4">Send Reset Link</button>
      </form>
    </div>
    <p class="text-center text-sm mt-4"><a href="{% url 'accounts:login' %}" class="text-[var(--color-primary)] hover:underline">Back to login</a></p>
  </div>
</div>
{% endblock %}
