{% extends "base.html" %}
{% block title %}Check Your Email — Wonzays Kollections{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4 bg-[var(--color-surface)]">
  <div class="w-full max-w-md text-center">
    <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    </div>
    <h1 class="font-serif font-bold text-2xl mb-2">Check your inbox</h1>
    <p class="text-[var(--color-text-muted)]">We've sent a password reset link to your email address.</p>
    <a href="{% url 'accounts:login' %}" class="btn-primary mt-8 inline-block">Back to Login</a>
  </div>
</div>
{% endblock %}
