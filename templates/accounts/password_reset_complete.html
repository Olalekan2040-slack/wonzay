{% extends "base.html" %}
{% block title %}Password Reset — Wonzays Kollections{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4 bg-[var(--color-surface)]">
  <div class="w-full max-w-md text-center">
    <h1 class="font-serif font-bold text-2xl mb-3">Password reset complete</h1>
    <p class="text-[var(--color-text-muted)] mb-6">Your password has been set. You can now sign in.</p>
    <a href="{% url 'accounts:login' %}" class="btn-primary">Sign In</a>
  </div>
</div>
{% endblock %}
