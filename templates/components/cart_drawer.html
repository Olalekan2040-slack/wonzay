{% load static %}
<!-- Cart Overlay -->
<div id="cart-overlay"
     style="display:none;position:fixed;inset:0;background:rgba(31,10,60,0.5);backdrop-filter:blur(4px);z-index:1100;"></div>

<!-- Cart Drawer -->
<aside id="cart-drawer"
       style="position:fixed;top:0;right:0;height:100%;width:100%;max-width:420px;background:white;z-index:1200;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,0.15);"
       aria-label="Shopping cart">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid #E8E4F5;">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="20" height="20" fill="none" stroke="#3D2F5C" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>
      </svg>
      <span style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#1F1F23;">Your Cart</span>
    </div>
    <button id="cart-close" aria-label="Close cart"
            style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#F7F5FF;border:none;border-radius:8px;cursor:pointer;color:#6B6B7C;transition:all 0.2s;"
            onmouseover="this.style.background='#E8E4F5'" onmouseout="this.style.background='#F7F5FF'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Content (loaded via AJAX) -->
  <div id="cart-drawer-content" style="flex:1;overflow-y:auto;padding:1.5rem;">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:1rem;color:#A7A7B8;">
      <div class="spinner"></div>
      <p style="font-size:0.9rem;">Loading cart…</p>
    </div>
  </div>

</aside>
