<!-- Quick Buy Drawer -->
<div id="quick-buy-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(38,33,92,0.45);z-index:50;"></div>

<aside id="quick-buy-drawer"
       style="position:fixed;top:0;right:0;height:100%;width:100%;max-width:380px;background:#fff;z-index:51;transform:translateX(100%);transition:transform 0.3s ease;display:flex;flex-direction:column;border-left:1px solid #EEEDFE;"
       aria-label="Quick buy">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #EEEDFE;">
    <span style="font-size:13px;font-weight:600;color:#26215C;">Quick Buy</span>
    <button data-qb-close aria-label="Close"
            style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#EEEDFE;border:none;border-radius:6px;cursor:pointer;color:#26215C;">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="quick-buy-drawer-content" style="flex:1;overflow-y:auto;padding:16px;"></div>
</aside>
