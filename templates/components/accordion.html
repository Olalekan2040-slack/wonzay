{% with uid=title|slugify %}
<div x-data="{ open: {% if open %}true{% else %}false{% endif %} }" class="border-b border-[var(--color-border)]">
  <button @click="open = !open"
          class="w-full flex items-center justify-between py-4 text-sm font-semibold text-left hover:text-[var(--color-primary)] transition">
    {{ title }}
    <svg class="w-4 h-4 flex-shrink-0 transition-transform duration-200" :class="open ? 'rotate-180' : ''"
         fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>
  <div x-show="open" x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
    <div class="pb-4 text-sm text-[var(--color-text-muted)] leading-relaxed">
      {{ content|linebreaks }}
    </div>
  </div>
</div>
{% endwith %}
