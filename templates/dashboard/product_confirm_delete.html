{% extends "dashboard/base.html" %}
{% block title %}Delete Product{% endblock %}
{% block page_title %}Delete Product{% endblock %}
{% block content %}
<div class="max-w-md bg-white border border-gray-200 p-6">
  <p class="mb-5">Are you sure you want to delete <strong>{{ object.name }}</strong>? This cannot be undone.</p>
  <form method="post" class="flex gap-3">{% csrf_token %}
    <button type="submit" class="btn-primary bg-red-600 border-red-600 hover:bg-red-700">Delete</button>
    <a href="{% url 'dashboard:product_list' %}" class="btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
