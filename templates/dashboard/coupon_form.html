{% extends "dashboard/base.html" %}
{% block title %}New Coupon{% endblock %}
{% block page_title %}Create Coupon{% endblock %}
{% block content %}
<div class="max-w-xl bg-white border border-gray-200 p-6">
  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    {% for field in form %}
    <div><label class="label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors|join:", " }}</p>{% endif %}</div>
    {% endfor %}
    <div class="flex gap-3 mt-2"><button type="submit" class="btn-primary">Create Coupon</button><a href="{% url 'dashboard:coupon_list' %}" class="btn-secondary">Cancel</a></div>
  </form>
</div>
{% endblock %}
